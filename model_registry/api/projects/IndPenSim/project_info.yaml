project_ID: "P0001"
project_name: "IndPenSim"
description: "The dataset used in this work corresponds to a series of experiments that were subsequently utilized to produce a simulation of industrial- scale penicillin fermentation processes (Paul and Thomas, 1996) which describes all the component balances relating to the process variables (Goldrick et al., 2015, 2019). The dataset generated from the industrial-scale penicillin fermentation (IndPenSim) includes 100 batches with each dataset comprising 2238 variables of which 39 variables correspond to process variables (manual and automatic control and online and offline measurements) and the remaining 2199 spond to Raman spectra. Per batch sensors recorded data every 12 min with the average batch length being approximately 230 h. Out of the 100 batches, the first 90 batches were operated under “normal” conditions using three different control strategies: (I) controlled by a recipe driven approach; (II) controlled by an operator and (III) controlled by an Advanced Process Control (APC). The last 10 batches contains faults, resulting in process deviations (Goldrick et al., 2019)."    
coordinator: "David Camilo Corrales"
start_date: "01/01/2024"
end_date: "31/12/2025"

db_config: 
    db: "InfluxDB"
    version: 2.7
    port: "8080"
    bucket: "STAMM Bucket"
    org_id : "9079c78425d0d055"

references:
  - id: "Paul1996"
    authors: "Paul, G. and Thomas, S."
    title: "A structured model for hyphal differentiation and penicillin production using penicillium chrysogenum"
    journal: "Biotechnology and bioengineering"
    year: 1996
    doi: "10.1016/XXX"
    apa: "Paul, G. C., & Thomas, C. R. (1996). A structured model for hyphal differentiation and penicillin production using Penicillium chrysogenum. Biotechnology and bioengineering, 51(5), 558-572."

  - id: "Goldrick2015"
    authors: "Goldrick, S., Ştefan, A., Lovett, D., Montague, G., & Lennox, B."
    title: "The development of an industrial-scale fed-batch fermentation simulation"
    journal: "Journal of biotechnology"
    year: 2015
    doi: "10.1002/XXX"
    apa: "Goldrick, S., Ştefan, A., Lovett, D., Montague, G., & Lennox, B. (2015). The development of an industrial-scale fed-batch fermentation simulation. Journal of biotechnology, 193, 70-82."

  - id: "Goldrick2019"
    authors: "Goldrick, S., Duran-Villalobos, C. A., Jankauskas, K., Lovett, D., Farid, S. S., & Lennox, B."
    title: "Modern day monitoring and control challenges outlined on an industrial-scale benchmark fermentation process"
    journal: "Computers & Chemical Engineering"
    year: 2019
    doi: "10.1002/XXX"
    apa: "Goldrick, S., Duran-Villalobos, C. A., Jankauskas, K., Lovett, D., Farid, S. S., & Lennox, B. (2019). Modern day monitoring and control challenges outlined on an industrial-scale benchmark fermentation process. Computers & Chemical Engineering, 130, 106471."

variables:
  - name: "Time (h)"
    column_type: "Time"
    units: "Hour"
    renamed_variable: "time"
    description: "Elapsed time in hours since the start of the experiment"

  - name: "Aeration rate(Fg:L/h)"
    column_type: "Actuator"
    units: "Fg:L/h"
    renamed_variable: "aeration_rate"
    description: "Rate of air supplied to the bioreactor per litre per hour"

  - name: "Agitator RPM(RPM:RPM)"
    column_type: "Actuator"
    units: "RPM"
    renamed_variable: "agitator"
    description: "Agitator speed in revolutions per minute, controlling mixing intensity"

  - name: "Sugar feed rate(Fs:L/h)"
    column_type: "Actuator"
    units: "L/h"
    renamed_variable: "sugar_feed_rate"
    description: "Rate at which sugar solution is fed into the bioreactor, measured in litres per hour"

  - name: "Acid flow rate(Fa:L/h)"
    column_type: "Actuator"
    units: "L/h"
    renamed_variable: "acid_flow_rate"
    description: "Rate of acid added to the bioreactor for pH control, in litres per hour"

  - name: "Base flow rate(Fb:L/h)"
    column_type: "Actuator"
    units: "L/h"
    renamed_variable: "base_flow_rate"
    description: "Rate of base solution added to the bioreactor for pH control, in litres per hour"

  - name: "Heating/cooling water flow rate(Fc:L/h)"
    column_type: "Actuator"
    units: "L/h"
    renamed_variable: "heating/cooling_water_flow_rate"
    description: "Flow rate of water used for heating or cooling in the bioreactor"

  - name: "Heating water flow rate(Fh:L/h)"
    column_type: "Actuator"
    units: "L/h"
    renamed_variable: "heating_water_flow_rate"
    description: "Flow rate of hot water supplied for heating the bioreactor"

  - name: "Water for injection/dilution(Fw:L/h)"
    column_type: "Actuator"
    units: "L/h"
    renamed_variable: "water_for_injection/dilution"
    description: "Flow rate of water injected or used for diluting substances within the bioreactor"

  - name: "Air head pressure(pressure:bar)"
    column_type: "Sensor"
    units: "bar"
    renamed_variable: "air_head_pressure"
    description: "Pressure of the air at the top of the bioreactor, measured in bar"

  - name: "Dumped broth flow(Fremoved:L/h)"
    column_type: "Actuator"
    units: "L/h"
    renamed_variable: "dumped_broth_flow"
    description: "Flow rate at which broth is removed from the bioreactor, in litres per hour"

  - name: "Substrate concentration(S:g/L)"
    column_type: "Actuator"
    units: "g/L"
    renamed_variable: "substrate_concentration"
    description: "Concentration of the substrate in the bioreactor, measured in grams per litre"

  - name: "Dissolved oxygen concentration(DO2:mg/L)"
    column_type: "Sensor"
    units: "mg/L"
    renamed_variable: "dissolved_oxygen_concentration"
    description: "Concentration of dissolved oxygen in the bioreactor, in milligrams per litre"

  - name: "Penicillin concentration(P:g/L)"
    column_type: "Soft_sensor"
    units: "g/L"
    renamed_variable: "penicillin_concentration"
    description: "Concentration of penicillin in the bioreactor, as estimated by a soft sensor"

  - name: "Vessel Volume(V:L)"
    column_type: "Computed_variable"
    units: "L"
    renamed_variable: "vessel_volume"
    description: "Total volume of liquid in the bioreactor vessel, measured in litres"

  - name: "Vessel Weight(Wt:Kg)"
    column_type: "Computed_variable"
    units: "Kg"
    renamed_variable: "vessel_weight"
    description: "Total weight of the bioreactor vessel, including contents, in kilograms"

  - name: "pH(pH:pH)"
    column_type: "Sensor"
    units: "pH"
    renamed_variable: "pH"
    description: "pH level in the bioreactor, indicating acidity or alkalinity"

  - name: "Temperature(T:K)"
    column_type: "Sensor"
    units: "Kelvin"
    renamed_variable: "temperature"
    description: "Temperature of the bioreactor contents, measured in Kelvin"

  - name: "Generated heat(Q:kJ)"
    column_type: "Sensor"
    units: "kJ"
    renamed_variable: "generated_heat"
    description: "Amount of heat generated during the process, measured in kilojoules"

  - name: "carbon dioxide percent in off-gas(CO2outgas:%)"
    column_type: "Sensor"
    units: "%"
    renamed_variable: "CO2_percent_in_off_gas"
    description: "Percentage of carbon dioxide present in the off-gas from the bioreactor"

  - name: "PAA flow(Fpaa:PAA flow (L/h))"
    column_type: "Actuator"
    units: "L/h"
    renamed_variable: "PAA_flow"
    description: "Flow rate of peracetic acid (PAA) supplied to the bioreactor, in litres per hour"

  - name: "PAA concentration offline(PAA_offline:PAA (g L^{-1}))"
    column_type: "Offline_measurement"
    units: "g L^{-1}"
    renamed_variable: "PAA_concentration"
    description: "Offline measurement of peracetic acid concentration in grams per litre"

  - name: "Oil flow(Foil:L/hr)"
    column_type: "Actuator"
    units: "L/h"
    renamed_variable: "oil_flow"
    description: "Flow rate of oil fed into the bioreactor, in litres per hour"

  - name: "NH_3 concentration off-line(NH3_offline:NH3 (g L^{-1}))"
    column_type: "Offline_measurement"
    units: "g L^{-1}"
    renamed_variable: "NH3_concentration"
    description: "Offline measurement of ammonia (NH3) concentration in grams per litre"

  - name: "Oxygen Uptake Rate(OUR:(g min^{-1}))"
    column_type: "Sensor"
    units: "g min^{-1}"
    renamed_variable: "oxygen_uptake_rate"
    description: "Rate of oxygen uptake in the bioreactor, measured in grams per minute"

  - name: "Oxygen in percent in off-gas(O2:O2 (%))"
    column_type: "Sensor"
    units: "%"
    renamed_variable: "oxygen_in_percent_in_off_gas"
    description: "Percentage of oxygen in the off-gas from the bioreactor"

  - name: "Offline Penicillin concentration(P_offline:P(g L^{-1}))"
    column_type: "Offline_measurement"
    units: "g L^{-1}"
    renamed_variable: "offline_penicillin_concentration"
    description: "Offline measurement of penicillin concentration in grams per litre"

  - name: "Offline Biomass concentratio(X_offline:X(g L^{-1}))"
    column_type: "Offline_measurement"
    units: "g L^{-1}"
    renamed_variable: "offline_biomass_concentration"
    description: "Offline measurement of biomass concentration in grams per litre"

  - name: "Carbon evolution rate(CER:g/h)"
    column_type: "Sensor"
    units: "g/h"
    renamed_variable: "carbon_evolution_rate"
    description: "Rate of carbon dioxide evolution, measured in grams per hour"

  - name: "Ammonia shots(NH3_shots:kgs)"
    column_type: "Actuator"
    units: "kgs"
    renamed_variable: "ammonia_shots"
    description: "Mass of ammonia shots added, measured in kilograms"

  - name: "Viscosity(Viscosity_offline:centPoise)"
    column_type: "Offline_measurement"
    units: "centPoise"
    renamed_variable: "viscosity"
    description: "Offline measurement of broth viscosity, measured in centipoise"

  - name: "Batch ID"
    column_type: "Experiment"
    units: "-"
    renamed_variable: "experiment_ID"
    description: "Unique identifier for the batch or experiment run"
