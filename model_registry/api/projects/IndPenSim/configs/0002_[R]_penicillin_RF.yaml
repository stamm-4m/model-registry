ml_model_configuration:
  model_identification:
    name: random_forest
    version: V.1.0
    ID: 0002_[R]_penicillin_RF
    UUID: '0000002'
    author: Acosta-Pavas, J. C., Robles-Rodriguez, C. E., Griol, D., Daboussi, F.,
      Aceves-Lara, C. A., & Corrales, D. C
    doi: https://doi.org/10.1016/j.compchemeng.2024.108736
    creation_date: '2022-01-24'
    project: ../project_info.yaml
    status: online
    status_description: Model is loaded and ready for predictions.
  model_description:
    learner: random_forest
    model_type: interpretable
    model_name: Random Forest [R implementation]
    description: Random forest (RF) builds multiple decision trees using different
      subsets of available features of the training data with bootstrapping and then
      combines their predictions to make a final prediction.
    language:
    - name: R
    - version: 4.3.3
    config_files:
      model_file: 0002_[R]_penicillin_RF.rds
      server: localhost
      port: 8081
      rest_api: predict
    packages:
    - package: ranger
      version: 0.16.0
    input_time_interval:
      time_interval:
        value: 12
        unit: minutes
      aggregation:
        method: NaN
        description: NaN
      description: One measurement every 12 minutes
  training_information:
    number_of_instances: 89800
    hyperparameters:
      number_of_trees: 5
      max_tree_depth: 7
      min_number_instances_per_leaf: ''
      committees: ''
      instance_based_correction: ''
    validation: 10-fold CV - 3 repetitions
