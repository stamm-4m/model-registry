variables:
  # -------------------------
  # Inputs (online variables)
  # -------------------------
  - name: "temperature"
    column_type: "Sensor"
    units: "°C"
    description: "Bioreactor temperature (online; MFCS BioPAT)."

  - name: "ph"
    column_type: "Sensor"
    renamed_variable: "ph"
    description: "Bioreactor pH (online; MFCS BioPAT)."

  - name: "po2"
    column_type: "Sensor"
    units: "%"
    description: "Dissolved oxygen percentage (online; MFCS BioPAT)."

  - name: "pressure"
    column_type: "Sensor"
    units: "mbar"
    description: "Overhead pressure (online; MFCS BioPAT)."

  - name: "agitation"
    column_type: "Actuator"
    units: "rpm"
    description: "Agitation setpoint/speed (online; MFCS BioPAT)."

  - name: "glucose_feed_setup"
    column_type: "Actuator"
    units: "g/h"
    description: "Glucose feed set point (online; MFCS BioPAT)."

  - name: "substrate_weight"
    column_type: "Computed_variable"
    units: "g"
    description: "Substrate weight (online; MFCS BioPAT)."

  - name: "base_weight"
    column_type: "Computed_variable"
    units: "g"
    description: "Base solution weight (online; MFCS BioPAT)."

  - name: "acit"
    column_type: "Computed_variable"
    units: "mL"
    description: "Acid totalizer (ACIT) (online; MFCS BioPAT)."

  - name: "o2_gas_out"
    column_type: "Sensor"
    units: "%"
    description: "O2 fraction in off-gas (online; INNOVA gas analyzer)."

  # -------------------------
  # Outputs (soft sensor)
  # -------------------------
  - name: "biomass_concentration"
    column_type: "Soft_sensor"
    units: "g/L"
    description: "Biomass concentration estimated by soft sensor (trained using offline biomass measurements)."


