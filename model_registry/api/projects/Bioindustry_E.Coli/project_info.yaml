project_ID: "P0002"
project_name: "Bioindustry_E.Coli"
description: >
  Soft-sensing project for recombinant nanobody production in Escherichia coli (strains WK6: CH10-12 and NbF12-10),
  using experimental data from 7 fed-batch runs carried out in 5 L bioreactors (Sartorius) with 2 L working volume.
  Online variables were monitored with MFCS BioPAT (sampling every 5 s) and off-gas was analyzed with an INNOVA 1313
  gas analyzer (every 5 min). Offline biomass measurements are used as ground-truth to train/validate soft sensors.
  For the first stage of this project, we focus only on biomass estimation using 10 online variables
  (temperature, pH, pO2, pressure, agitation, glucose feed setup, substrate weight, base weight, ACIT, O2 Gas out).
  Data source: IBISBA Knowledge Hub dataset (see 'data_sources').

coordinator: "Juan Camilo Acosta-Pavas"
contributors:
  - "David Camilo Corrales"
  - "Susana Alonso Villela"
  - "Georgios Georgakilas"
  - "Luc Fillaudeau"
  - "César Arturo Aceves-Lara"

start_date: "01/01/2023"
end_date: "31/12/2026"

data_sources:
  - name: "IBISBA Knowledge Hub - Nanobody E. coli dataset"
    url: "https://hub.ibisba.eu/data_files/145"
    notes: "Experimental datasets used to train ML soft sensors; online (MFCS/INNOVA) and offline measurements."

