services:
  backend:
    build: .
    container_name: model-registry-backend
    command: python model_registry/backend/app_backend.py
    ports:
      - "8050:8050"
    volumes:
      - ./model_registry:/app/model_registry
    restart: unless-stopped

  api:
    build: .
    container_name: model-registry-api
    command: >
      uvicorn model_registry.api.app_api:main
      --host 0.0.0.0
      --port 8081
    ports:
      - "8081:8081"
    depends_on:
      - backend
    environment:
      R_API_URL: http://backend:8050
    volumes:
      - ./model_registry:/app/model_registry
    restart: unless-stopped


    
