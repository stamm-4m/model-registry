version: "3.9"

services:
  backend:
    build: .
    container_name: model-registry-backend
    command: poetry run python model_registry/backend/app_backend.py
    ports:
      - "8050:8050"
    volumes:
      - ./model_registry/backend/data:/app/model_registry/backend/data
      - ./model_registry/api/projects:/app/model_registry/api/projects
    restart: unless-stopped

  api:
    build: .
    container_name: model-registry-api
    command: poetry run python model_registry/api/app_api.py
    ports:
      - "8081:8081"
    depends_on:
      - backend
    volumes:
      - ./model_registry/api/projects:/app/model_registry/api/projects
      - ./model_registry/backend/data:/app/model_registry/backend/data
    restart: unless-stopped
