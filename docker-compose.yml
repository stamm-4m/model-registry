version: "3.9"

services:
  model-registry:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: ml_model_registry
    ports:
      - "8000:8000"
    volumes:
      - ./projects:/app/projects
      - ./assets:/app/assets
    environment:
      # Point Python proxy to R API inside the same Docker network
      - R_API_URL=http://r-api:8081/predict
    networks:
      - ml_net

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: ml_streamlit
    ports:
      - "8501:8501"
    environment:
      - FASTAPI_URL=http://model-registry:8000
    volumes:
      - ./projects:/app/projects
      - ./assets:/app/assets
    depends_on:
      - model-registry
    networks:
      - ml_net

  r-api:
    build:
      context: .
      dockerfile: Dockerfile.r
    container_name: ml_r_api
    ports:
      - "8081:8081"
    volumes:
      - ./projects:/app/projects
      - ./configs:/app/configs
    networks:
      - ml_net

networks:
  ml_net:
    driver: bridge
